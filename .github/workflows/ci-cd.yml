name: Hostel DevOps CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

    # 1. Get code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Compile Java
    - name: Compile Java Files
      run: |
        cd app
        javac *.java

    # 4. Build Docker Image
    - name: Build Docker Image
      run: docker build -t hostel-app .

    # 5. Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 6. Tag Image
    - name: Tag Image
      run: docker tag hostel-app ${{ secrets.DOCKER_USERNAME }}/hostel-app:latest

    # 7. Push Image
    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/hostel-app:latest