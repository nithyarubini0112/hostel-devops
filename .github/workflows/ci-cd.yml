name: Java CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'

    - name: Compile
      run: javac app/Main.java

    - name: Run App (Test)
      run: java -cp app Main || true

    - name: Build Docker Image
      run: docker build -t hostel-app .