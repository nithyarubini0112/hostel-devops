name: Java CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile All Files
      run: javac app/*.java

    - name: Run App (Test)
      run: java -cp app Main || true

    - name: Build Docker Image
      run: docker build -t hostel-app .